version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: iuscyber-postgres
    restart: always
    environment:
      POSTGRES_USER: iuscyber_user
      POSTGRES_PASSWORD: iuscyber_password
      POSTGRES_DB: iuscyber_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iuscyber_user -d iuscyber_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
